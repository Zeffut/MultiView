# MultiView build config — Minecraft 26.1.x
# Apply via: ./scripts/build-version.sh 26.1
# Uses mojmap directly with noIntermediateMappings() (Yarn/Intermediary not yet published).

minecraft_version=26.1.2
loader_version=0.19.2
fabric_version=0.148.2+26.1.2
loom_version=1.16-SNAPSHOT

# yarn_mappings is intentionally unset — Loom defaults to mojmap.
yarn_mappings=

# Flashback 0.40.0 for 26.1.x
flashback_version=0.40.0
flashback_modrinth_id=4das1Fjq
flashback_filename_pattern=Flashback-${flashback_version}-for-MC26.1.jar

mod_minecraft_dep=>=26.1 <27
mod_flashback_dep=>=0.40.0 <0.41

# Tells build.gradle to enable loom.noIntermediateMappings()
no_intermediate=true

# MC 26.1+ requires Java 25
java_version=25

modrinth_game_versions=26.1,26.1.1,26.1.2
