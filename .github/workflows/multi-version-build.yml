name: Multi-version build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build MC ${{ matrix.mc }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mc:
          # Only versions known to compile today are uncommented. As source-code
          # shims land for older MC API differences, flip the entries below.
          - '1.21.11'
          # - '1.21.9'
          # - '1.21.6'
          # - '1.21.5'
          # - '1.21.4'
          # - '1.21'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ matrix.mc }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'versions/${{ matrix.mc }}.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ matrix.mc }}-

      - name: Build for MC ${{ matrix.mc }}
        run: |
          set -e
          chmod +x scripts/build-version.sh
          ./scripts/build-version.sh ${{ matrix.mc }} || { echo "Build failed for MC ${{ matrix.mc }}"; exit 1; }

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: multiview-mc${{ matrix.mc }}
          path: build/libs/multiview-*-mc${{ matrix.mc }}.jar
          if-no-files-found: error

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/multiview-*-mc${{ matrix.mc }}.jar
